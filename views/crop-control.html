<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yayın Kontrolü</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: transparent;
            overflow: hidden;
            padding: 10px;
        }

        .control-panel {
            background: rgba(15, 12, 41, 0.95);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: center;
            color: white;
            backdrop-filter: blur(10px);
            -webkit-app-region: drag;
        }

        .title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #22c55e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .title i {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .btn-stop {
            -webkit-app-region: no-drag;
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-stop:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <div class="title"><i class="fa fa-circle"></i> Ekranda Yayınlanıyor</div>
        <button class="btn-stop" onclick="stopPublish()"><i class="fa fa-stop-circle"></i> Yayını Durdur</button>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        function stopPublish() {
            ipcRenderer.send('close-crop');
        }
    </script>
</body>
</html>
